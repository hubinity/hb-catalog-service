spring:
  application:
    name: hb-catalog-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.batch_size: 50
      hibernate.order_inserts: true
      # Forces Instant <-> TIMESTAMPTZ serialization in UTC; without this Hibernate uses the JVM default zone.
      hibernate.jdbc.time_zone: UTC
      hibernate.generate_statistics: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: public
  rabbitmq:
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 500ms
          max-attempts: 5
          multiplier: 2
  security:
    oauth2:
      resourceserver:
        jwt:
          principal-claim-name: preferred_username
          authorities-claim-name: realm_access.roles   # informational only; our converter handles the real merge

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING:0.1}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

logging:
  level:
    root: INFO
    com.hubinity: INFO
    org.springframework.web: INFO
  pattern:
    level: "%5p [traceId=%X{traceId:-} spanId=%X{spanId:-}]"

resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html

app:
  security:
    keycloak:
      client-id: ${HB_CATALOG_KEYCLOAK_CLIENT_ID:hb-catalog-service}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4201,http://localhost:4202,http://localhost:4203}
